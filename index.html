<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VisitDesk — Client & Visit Tracker</title>
<link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiVmlzaXREZXNrIiwic2hvcnRfbmFtZSI6IlZpc2l0RGVzayIsImRpc3BsYXkiOiJzdGFuZGFsb25lIiwidGhlbWVfY29sb3IiOiIjMUE0RDhGIiwiYmFja2dyb3VuZF9jb2xvciI6IiNFQUYyRkMifQ==">
<meta name="theme-color" content="#1A4D8F">
<style>
  :root{
    --blue-deep:#1A4D8F;
    --blue-deep-dark:#123a6b;
    --blue-tint:#EAF2FC;
    --blue-tint-2:#D7E7FB;
    --white:#FFFFFF;
    --green:#2E9E5B;
    --green-tint:#E4F6EC;
    --amber:#E8A33D;
    --amber-tint:#FBF0DE;
    --red:#D14B4B;
    --red-tint:#FBE7E7;
    --slate:#5A6B7D;
    --slate-light:#8C9AAA;
    --ink:#16263B;
    --radius:16px;
    --shadow: 0 2px 10px rgba(26,77,143,0.08), 0 1px 2px rgba(26,77,143,0.06);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, Arial, sans-serif;
    background: var(--blue-tint);
    color: var(--ink);
    height:100vh;
    height:100dvh;
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }
  #app{
    max-width:480px;
    margin:0 auto;
    height:100vh;
    height:100dvh;
    background: var(--blue-tint);
    display:flex;
    flex-direction:column;
    position:relative;
  }

  /* ---------- HEADER ---------- */
  header.topbar{
    background: linear-gradient(135deg, var(--blue-deep) 0%, #21609e 100%);
    color:white;
    padding: calc(env(safe-area-inset-top,0px) + 18px) 20px 20px;
    flex-shrink:0;
    position:relative;
    overflow:hidden;
  }
  header.topbar::after{
    content:"";
    position:absolute;
    right:-40px; top:-40px;
    width:160px;height:160px;
    border-radius:50%;
    background: rgba(255,255,255,0.06);
  }
  header.topbar .greet{
    font-size:13px;
    opacity:0.85;
    font-weight:500;
    letter-spacing:0.2px;
  }
  header.topbar .title{
    font-size:24px;
    font-weight:700;
    margin-top:2px;
    letter-spacing:-0.3px;
  }
  .stats-row{
    display:flex;
    gap:8px;
    margin-top:16px;
    position:relative;
    z-index:1;
  }
  .stat-pill{
    flex:1;
    min-width:0;
    background: rgba(255,255,255,0.14);
    border-radius:12px;
    padding:8px 4px;
    text-align:center;
    backdrop-filter: blur(2px);
  }
  .stat-pill .num{font-size:16px; font-weight:700; line-height:1.1;}
  .stat-pill .lbl{font-size:9.5px; opacity:0.85; margin-top:2px; font-weight:500; white-space:nowrap;}

  /* ---------- MAIN SCROLL AREA ---------- */
  main{
    flex:1;
    overflow-y:auto;
    padding: 16px 16px 90px;
    -webkit-overflow-scrolling: touch;
  }
  .section-label{
    font-size:13px;
    font-weight:700;
    color: var(--slate);
    text-transform:uppercase;
    letter-spacing:0.6px;
    margin: 18px 4px 10px;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .section-label:first-child{margin-top:2px;}
  .section-label .count{
    background: var(--blue-tint-2);
    color: var(--blue-deep);
    font-size:11px;
    padding:2px 8px;
    border-radius:20px;
    font-weight:700;
  }

  /* ---------- TIMELINE (signature element) ---------- */
  .timeline{
    position:relative;
    padding-left:22px;
  }
  .timeline::before{
    content:"";
    position:absolute;
    left:6px; top:6px; bottom:6px;
    width:2px;
    background: linear-gradient(to bottom, var(--blue-deep), var(--blue-tint-2));
    border-radius:2px;
  }
  .t-item{
    position:relative;
    margin-bottom:12px;
  }
  .t-dot{
    position:absolute;
    left:-22px; top:18px;
    width:12px;height:12px;
    border-radius:50%;
    background: var(--blue-deep);
    border:3px solid var(--blue-tint);
    box-shadow:0 0 0 1px var(--blue-deep);
  }
  .t-item.status-done .t-dot{background: var(--green); box-shadow:0 0 0 1px var(--green);}
  .t-item.status-overdue .t-dot{background: var(--red); box-shadow:0 0 0 1px var(--red);}

  /* ---------- CARDS ---------- */
  .card{
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding:14px 16px;
    position:relative;
    border-left: 5px solid var(--blue-deep);
  }
  .card.status-today{border-left-color: var(--amber);}
  .card.status-overdue{border-left-color: var(--red);}
  .card.status-done{border-left-color: var(--green);}
  .card-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:10px;
  }
  .client-name{
    font-size:16px;
    font-weight:700;
    color: var(--ink);
  }
  .client-phone{
    font-size:13px;
    color: var(--slate);
    margin-top:2px;
    display:flex;
    align-items:center;
    gap:5px;
  }
  .visit-time{
    text-align:right;
    flex-shrink:0;
  }
  .visit-time .time{font-size:14px; font-weight:700; color:var(--blue-deep);}
  .visit-time .date{font-size:11px; color:var(--slate-light); margin-top:1px;}
  .badge{
    display:inline-block;
    font-size:10.5px;
    font-weight:700;
    padding:3px 9px;
    border-radius:20px;
    margin-top:8px;
    letter-spacing:0.2px;
  }
  .badge.today{background:var(--amber-tint); color:#9a6a14;}
  .badge.overdue{background:var(--red-tint); color:var(--red);}
  .badge.upcoming{background:var(--blue-tint-2); color:var(--blue-deep);}
  .badge.done{background:var(--green-tint); color:var(--green);}
  .badge.followup{background:#EFE7FB; color:#7B4FCC;}

  .card.status-followup{border-left-color:#7B4FCC;}
  .t-item.status-followup .t-dot{background:#7B4FCC; box-shadow:0 0 0 1px #7B4FCC;}
  .btn-followup{background:#EFE7FB; color:#7B4FCC;}
  .remarks{
    font-size:13px;
    color:var(--slate);
    margin-top:8px;
    line-height:1.4;
    background: #F7FAFD;
    padding:8px 10px;
    border-radius:10px;
  }
  .card-actions{
    display:flex;
    gap:8px;
    margin-top:10px;
  }
  .card-actions button{
    flex:1;
    border:none;
    padding:8px 0;
    border-radius:10px;
    font-size:12.5px;
    font-weight:700;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:5px;
  }
  .btn-call{background:var(--green-tint); color:var(--green);}
  .btn-done{background:var(--blue-tint-2); color:var(--blue-deep);}
  .btn-edit{background:#F0F2F5; color:var(--slate);}
  .btn-del{background:var(--red-tint); color:var(--red); flex:0 0 38px;}

  .empty-state{
    text-align:center;
    padding:50px 20px;
    color:var(--slate-light);
  }
  .empty-state .icon{font-size:40px; margin-bottom:8px;}
  .empty-state .msg{font-size:14px; font-weight:600; color:var(--slate);}
  .empty-state .sub{font-size:12.5px; margin-top:4px;}

  /* client directory list (no visit yet) */
  .mini-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:var(--white);
    border-radius:14px;
    padding:12px 14px;
    box-shadow:var(--shadow);
    margin-bottom:8px;
  }
  .mini-row .left{display:flex; align-items:center; gap:10px;}
  .avatar{
    width:36px;height:36px;
    border-radius:50%;
    background: var(--blue-tint-2);
    color: var(--blue-deep);
    display:flex; align-items:center; justify-content:center;
    font-weight:700; font-size:14px;
    flex-shrink:0;
  }
  .mini-row .name{font-size:14px; font-weight:600;}
  .mini-row .phone{font-size:12px; color:var(--slate-light);}

  /* ---------- COMPACT LIST ROW (new home screen) ---------- */
  .clist-row{
    display:flex;
    align-items:center;
    gap:12px;
    background:var(--white);
    border-radius:14px;
    padding:12px 14px;
    box-shadow:var(--shadow);
    margin-bottom:8px;
    border-left:4px solid var(--blue-deep);
    cursor:pointer;
  }
  .clist-row.status-today{border-left-color:var(--amber);}
  .clist-row.status-overdue{border-left-color:var(--red);}
  .clist-row.status-done{border-left-color:var(--green);}
  .clist-row.status-followup,.clist-row.status-followup-upcoming{border-left-color:#7B4FCC;}
  .clist-avatar{
    width:38px;height:38px;
    border-radius:50%;
    background:var(--blue-tint-2);
    color:var(--blue-deep);
    display:flex; align-items:center; justify-content:center;
    font-weight:700; font-size:13px;
    flex-shrink:0;
  }
  .clist-body{flex:1; min-width:0;}
  .clist-name{font-size:14.5px; font-weight:700; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .clist-sub{font-size:12px; color:var(--slate-light); margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .clist-right{text-align:right; flex-shrink:0;}
  .clist-time{font-size:13px; font-weight:700; color:var(--blue-deep);}
  .clist-date{font-size:10.5px; color:var(--slate-light); margin-top:1px;}
  .clist-chip{
    display:inline-block;
    font-size:9.5px;
    font-weight:700;
    padding:2px 7px;
    border-radius:20px;
    margin-top:4px;
    letter-spacing:0.2px;
  }
  .clist-chip.today{background:var(--amber-tint); color:#9a6a14;}
  .clist-chip.overdue{background:var(--red-tint); color:var(--red);}
  .clist-chip.upcoming{background:var(--blue-tint-2); color:var(--blue-deep);}
  .clist-chip.done{background:var(--green-tint); color:var(--green);}
  .clist-chip.followup,.clist-chip.followup-upcoming{background:#EFE7FB; color:#7B4FCC;}
  .clist-chevron{color:var(--slate-light); font-size:18px; flex-shrink:0;}

  /* ---------- DETAIL MODAL ---------- */
  .detail-row{display:flex; gap:10px; padding:10px 0; border-bottom:1px solid #F0F2F5;}
  .detail-row:last-child{border-bottom:none;}
  .detail-row .dlabel{font-size:11.5px; font-weight:700; color:var(--slate-light); text-transform:uppercase; letter-spacing:0.3px; flex:0 0 90px;}
  .detail-row .dval{font-size:14px; color:var(--ink); flex:1;}
  .detail-header{display:flex; align-items:center; gap:12px; margin-bottom:4px;}
  .detail-avatar{
    width:48px;height:48px; border-radius:50%;
    background:var(--blue-tint-2); color:var(--blue-deep);
    display:flex; align-items:center; justify-content:center;
    font-weight:700; font-size:17px; flex-shrink:0;
  }
  .btn-whatsapp{background:#DDF3E4; color:#1F8C3B;}
  nav.tabbar{
    position:absolute;
    bottom:0; left:0; right:0;
    background: var(--white);
    display:flex;
    padding: 8px 6px calc(env(safe-area-inset-bottom,0px) + 8px);
    box-shadow: 0 -2px 12px rgba(26,77,143,0.10);
    z-index:5;
  }
  .tab{
    flex:1;
    text-align:center;
    border:none;
    background:none;
    padding:6px 2px;
    color: var(--slate-light);
    cursor:pointer;
    border-radius:12px;
  }
  .tab .icon{font-size:20px; display:block;}
  .tab .lbl{font-size:10.5px; font-weight:600; margin-top:2px; display:block;}
  .tab.active{color: var(--blue-deep);}
  .tab.active .icon{transform:scale(1.05);}

  .fab{
    position:absolute;
    right:18px;
    bottom: 78px;
    width:56px; height:56px;
    border-radius:50%;
    background: linear-gradient(135deg, var(--blue-deep), #21609e);
    color:white;
    font-size:28px;
    border:none;
    box-shadow: 0 6px 16px rgba(26,77,143,0.35);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    z-index:6;
    line-height:1;
  }

  /* ---------- MODAL ---------- */
  .modal-overlay{
    position:fixed; inset:0;
    background:rgba(16,38,59,0.45);
    display:none;
    align-items:flex-end;
    justify-content:center;
    z-index:20;
  }
  .modal-overlay.open{display:flex;}
  .modal{
    background:var(--white);
    width:100%;
    max-width:480px;
    border-radius:22px 22px 0 0;
    padding:18px 20px calc(env(safe-area-inset-bottom,0px) + 20px);
    max-height:88vh;
    overflow-y:auto;
    animation: slideUp 0.22s ease-out;
  }
  @keyframes slideUp{from{transform:translateY(30px); opacity:0.5;} to{transform:translateY(0); opacity:1;}}
  .modal-handle{
    width:36px;height:4px;background:#E0E6ED;border-radius:4px;margin:0 auto 14px;
  }
  .modal h2{font-size:18px; margin:0 0 14px; color:var(--ink); font-weight:700;}
  .field{margin-bottom:13px;}
  .field label{
    display:block; font-size:12.5px; font-weight:700; color:var(--slate);
    margin-bottom:5px; text-transform:uppercase; letter-spacing:0.3px;
  }
  .field input, .field textarea, .field select{
    width:100%;
    border:1.5px solid #E0E8F0;
    background:#F8FAFC;
    border-radius:11px;
    padding:11px 12px;
    font-size:14.5px;
    font-family:inherit;
    color:var(--ink);
  }
  .field input:focus, .field textarea:focus, .field select:focus{
    outline:none; border-color:var(--blue-deep); background:white;
  }
  .field textarea{resize:vertical; min-height:60px;}
  .row2{display:flex; gap:10px;}
  .row2 .field{flex:1;}
  .modal-actions{display:flex; gap:10px; margin-top:6px;}
  .btn-primary{
    flex:1; background:var(--blue-deep); color:white; border:none;
    padding:13px 0; border-radius:12px; font-size:15px; font-weight:700; cursor:pointer;
  }
  .btn-secondary{
    background:#F0F2F5; color:var(--slate); border:none;
    padding:13px 18px; border-radius:12px; font-size:15px; font-weight:700; cursor:pointer;
  }
  .toast{
    position:absolute;
    top: calc(env(safe-area-inset-top,0px) + 14px);
    left:50%; transform:translateX(-50%) translateY(-10px);
    background:var(--ink); color:white;
    padding:10px 18px; border-radius:30px;
    font-size:13px; font-weight:600;
    opacity:0; transition: all 0.25s ease;
    z-index:50; pointer-events:none;
    box-shadow:0 4px 14px rgba(0,0,0,0.25);
    white-space:nowrap;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  ::-webkit-scrollbar{width:0px;}
</style>
</head>
<body>
<div id="app">

  <header class="topbar">
    <div class="greet" id="dateLabel">Today</div>
    <div class="title">VisitDesk</div>
    <div class="stats-row">
      <div class="stat-pill"><div class="num" id="statToday">0</div><div class="lbl">Today</div></div>
      <div class="stat-pill"><div class="num" id="statUpcoming">0</div><div class="lbl">Upcoming</div></div>
      <div class="stat-pill"><div class="num" id="statOverdue">0</div><div class="lbl">Overdue</div></div>
      <div class="stat-pill"><div class="num" id="statDone">0</div><div class="lbl">Done</div></div>
      <div class="stat-pill"><div class="num" id="statClients">0</div><div class="lbl">Clients</div></div>
    </div>
  </header>

  <main id="mainContent"></main>

  <button class="fab" id="fabAdd">＋</button>

  <nav class="tabbar">
    <button class="tab active" data-tab="home"><span class="icon">🏠</span><span class="lbl">Visits</span></button>
    <button class="tab" data-tab="clients"><span class="icon">👥</span><span class="lbl">Clients</span></button>
    <button class="tab" data-tab="settings"><span class="icon">⚙️</span><span class="lbl">Settings</span></button>
  </nav>

  <div class="toast" id="toast"></div>
</div>

<!-- Follow-up scheduling modal (shown after marking a visit done) -->
<div class="modal-overlay" id="followupOverlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>Schedule a Follow-up?</h2>
    <p style="font-size:13.5px;color:var(--slate);margin:-6px 0 16px;">Visit marked complete for <strong id="followupName"></strong>. Want a reminder to check back in?</p>
    <div class="field">
      <label>When</label>
      <select id="fuQuick">
        <option value="1">Tomorrow</option>
        <option value="3" selected>In 3 days</option>
        <option value="7">In 1 week</option>
        <option value="14">In 2 weeks</option>
        <option value="30">In 1 month</option>
        <option value="custom">Custom date</option>
        <option value="none">No follow-up needed</option>
      </select>
    </div>
    <div class="field" id="fuCustomDateField" style="display:none;">
      <label>Follow-up Date</label>
      <input type="date" id="fuCustomDate">
    </div>
    <div class="field">
      <label>Follow-up Note</label>
      <textarea id="fuNote" placeholder="e.g. Check if loan got approved, share new listings"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" id="fuSkipBtn">Skip</button>
      <button class="btn-primary" id="fuSaveBtn">Save Follow-up</button>
    </div>
  </div>
</div>

<!-- Add/Edit Client+Visit Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 id="modalTitle">New Client & Visit</h2>
    <input type="hidden" id="editId">
    <div class="field">
      <label>Client Name *</label>
      <input type="text" id="fName" placeholder="e.g. Rohan Sharma">
    </div>
    <div class="field">
      <label>Phone Number *</label>
      <input type="tel" id="fPhone" placeholder="e.g. 9876543210">
    </div>
    <div class="row2">
      <div class="field">
        <label>Visit Date *</label>
        <input type="date" id="fDate">
      </div>
      <div class="field">
        <label>Visit Time *</label>
        <input type="time" id="fTime">
      </div>
    </div>
    <div class="field">
      <label>Property / Site</label>
      <input type="text" id="fProperty" placeholder="e.g. Skyline Heights, Flat 402">
    </div>
    <div class="field">
      <label>Remarks</label>
      <textarea id="fRemarks" placeholder="e.g. Interested in 2BHK, budget 80L, follow up on loan status"></textarea>
    </div>
    <div class="field">
      <label>Alarm Reminder</label>
      <select id="fAlarm">
        <option value="0">At visit time</option>
        <option value="15">15 minutes before</option>
        <option value="30" selected>30 minutes before</option>
        <option value="60">1 hour before</option>
        <option value="1440">1 day before</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" id="cancelBtn">Cancel</button>
      <button class="btn-primary" id="saveBtn">Save Visit</button>
    </div>
  </div>
</div>

<!-- Client Detail Modal (tap a row to open) -->
<div class="modal-overlay" id="detailOverlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="detail-header">
      <div class="detail-avatar" id="dAvatar"></div>
      <div>
        <div style="font-size:18px;font-weight:700;color:var(--ink)" id="dName"></div>
        <span class="badge" id="dBadge"></span>
      </div>
    </div>
    <div style="margin-top:10px;">
      <div class="detail-row"><div class="dlabel">Phone</div><div class="dval" id="dPhone"></div></div>
      <div class="detail-row" id="dPropertyRow"><div class="dlabel">Property</div><div class="dval" id="dProperty"></div></div>
      <div class="detail-row" id="dTimeRow"><div class="dlabel">Visit</div><div class="dval" id="dTime"></div></div>
      <div class="detail-row" id="dRemarksRow"><div class="dlabel">Remarks</div><div class="dval" id="dRemarks"></div></div>
      <div class="detail-row" id="dFollowupRow"><div class="dlabel">Follow-up</div><div class="dval" id="dFollowup"></div></div>
    </div>
    <div class="card-actions" style="margin-top:14px;">
      <button class="btn-call" data-action="call" id="dCallBtn">📞 Call</button>
      <button class="btn-whatsapp" data-action="whatsapp" id="dWhatsappBtn">💬 WhatsApp</button>
    </div>
    <div class="card-actions" style="margin-top:8px;">
      <button class="btn-done" data-action="done" id="dDoneBtn">✓ Mark Done</button>
      <button class="btn-followup" data-action="followupdone" id="dFollowupDoneBtn">✓ Followed Up</button>
      <button class="btn-edit" data-action="edit" id="dEditBtn">✎ Edit</button>
      <button class="btn-del" data-action="delete" id="dDelBtn">🗑</button>
    </div>
    <div class="modal-actions" style="margin-top:14px;">
      <button class="btn-secondary" id="dCloseBtn" style="flex:1;">Close</button>
    </div>
  </div>
</div>
