<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VisitDesk — Client & Visit Tracker</title>
<link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiVmlzaXREZXNrIiwic2hvcnRfbmFtZSI6IlZpc2l0RGVzayIsImRpc3BsYXkiOiJzdGFuZGFsb25lIiwidGhlbWVfY29sb3IiOiIjMUE0RDhGIiwiYmFja2dyb3VuZF9jb2xvciI6IiNFQUYyRkMifQ==">
<meta name="theme-color" content="#1A4D8F">
<style>
  :root{
    --blue-deep:#1A4D8F;
    --blue-deep-dark:#123a6b;
    --blue-tint:#EAF2FC;
    --blue-tint-2:#D7E7FB;
    --white:#FFFFFF;
    --green:#2E9E5B;
    --green-tint:#E4F6EC;
    --amber:#E8A33D;
    --amber-tint:#FBF0DE;
    --red:#D14B4B;
    --red-tint:#FBE7E7;
    --slate:#5A6B7D;
    --slate-light:#8C9AAA;
    --ink:#16263B;
    --radius:16px;
    --shadow: 0 2px 10px rgba(26,77,143,0.08), 0 1px 2px rgba(26,77,143,0.06);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, Arial, sans-serif;
    background: var(--blue-tint);
    color: var(--ink);
    height:100vh;
    height:100dvh;
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }
  #app{
    max-width:480px;
    margin:0 auto;
    height:100vh;
    height:100dvh;
    background: var(--blue-tint);
    display:flex;
    flex-direction:column;
    position:relative;
  }

  /* ---------- HEADER ---------- */
  header.topbar{
    background: linear-gradient(135deg, var(--blue-deep) 0%, #21609e 100%);
    color:white;
    padding: calc(env(safe-area-inset-top,0px) + 14px) 20px 16px;
    flex-shrink:0;
    position:relative;
    overflow:hidden;
  }
  header.topbar::after{
    content:"";
    position:absolute;
    right:-40px; top:-40px;
    width:160px;height:160px;
    border-radius:50%;
    background: rgba(255,255,255,0.06);
  }
  .hello-veer{
    font-size:26px;
    font-weight:800;
    letter-spacing:-0.5px;
    margin-bottom:2px;
    line-height:1.1;
  }
  header.topbar .greet{
    font-size:13px;
    opacity:0.85;
    font-weight:500;
    letter-spacing:0.2px;
    margin-top:1px;
  }
  header.topbar .title{
    font-size:22px;
    font-weight:700;
    margin-top:1px;
    letter-spacing:-0.3px;
  }
  .stats-grid{
    display:grid;
    grid-template-columns: repeat(3,1fr);
    gap:8px;
    margin-top:14px;
    position:relative;
    z-index:1;
  }
  .stat-pill{
    background: rgba(255,255,255,0.14);
    border-radius:12px;
    padding:10px 6px;
    text-align:center;
    backdrop-filter: blur(2px);
    cursor:pointer;
    border:2px solid transparent;
    transition: all 0.15s ease;
  }
  .stat-pill.active{
    background: rgba(255,255,255,0.32);
    border-color: rgba(255,255,255,0.7);
    transform: scale(1.04);
  }
  .stat-pill .num{font-size:20px; font-weight:800; line-height:1.1;}
  .stat-pill .lbl{font-size:10px; opacity:0.9; margin-top:3px; font-weight:600; white-space:nowrap;}

  /* ---------- MAIN SCROLL AREA ---------- */
  main{
    flex:1;
    overflow-y:auto;
    padding: 16px 16px 90px;
    -webkit-overflow-scrolling: touch;
  }
  .section-label{
    font-size:13px;
    font-weight:700;
    color: var(--slate);
    text-transform:uppercase;
    letter-spacing:0.6px;
    margin: 18px 4px 10px;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .section-label:first-child{margin-top:2px;}
  .section-label .count{
    background: var(--blue-tint-2);
    color: var(--blue-deep);
    font-size:11px;
    padding:2px 8px;
    border-radius:20px;
    font-weight:700;
  }

  /* ---------- TIMELINE (signature element) ---------- */
  .timeline{
    position:relative;
    padding-left:22px;
  }
  .timeline::before{
    content:"";
    position:absolute;
    left:6px; top:6px; bottom:6px;
    width:2px;
    background: linear-gradient(to bottom, var(--blue-deep), var(--blue-tint-2));
    border-radius:2px;
  }
  .t-item{
    position:relative;
    margin-bottom:12px;
  }
  .t-dot{
    position:absolute;
    left:-22px; top:18px;
    width:12px;height:12px;
    border-radius:50%;
    background: var(--blue-deep);
    border:3px solid var(--blue-tint);
    box-shadow:0 0 0 1px var(--blue-deep);
  }
  .t-item.status-done .t-dot{background: var(--green); box-shadow:0 0 0 1px var(--green);}
  .t-item.status-overdue .t-dot{background: var(--red); box-shadow:0 0 0 1px var(--red);}

  /* ---------- CARDS ---------- */
  .card{
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding:14px 16px;
    position:relative;
    border-left: 5px solid var(--blue-deep);
  }
  .card.status-today{border-left-color: var(--amber);}
  .card.status-overdue{border-left-color: var(--red);}
  .card.status-done{border-left-color: var(--green);}
  .card-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:10px;
  }
  .client-name{
    font-size:16px;
    font-weight:700;
    color: var(--ink);
  }
  .client-phone{
    font-size:13px;
    color: var(--slate);
    margin-top:2px;
    display:flex;
    align-items:center;
    gap:5px;
  }
  .visit-time{
    text-align:right;
    flex-shrink:0;
  }
  .visit-time .time{font-size:14px; font-weight:700; color:var(--blue-deep);}
  .visit-time .date{font-size:11px; color:var(--slate-light); margin-top:1px;}
  .badge{
    display:inline-block;
    font-size:10.5px;
    font-weight:700;
    padding:3px 9px;
    border-radius:20px;
    margin-top:8px;
    letter-spacing:0.2px;
  }
  .badge.today{background:var(--amber-tint); color:#9a6a14;}
  .badge.overdue{background:var(--red-tint); color:var(--red);}
  .badge.upcoming{background:var(--blue-tint-2); color:var(--blue-deep);}
  .badge.done{background:var(--green-tint); color:var(--green);}
  .badge.followup{background:#EFE7FB; color:#7B4FCC;}

  .card.status-followup{border-left-color:#7B4FCC;}
  .t-item.status-followup .t-dot{background:#7B4FCC; box-shadow:0 0 0 1px #7B4FCC;}
  .btn-followup{background:#EFE7FB; color:#7B4FCC;}
  .remarks{
    font-size:13px;
    color:var(--slate);
    margin-top:8px;
    line-height:1.4;
    background: #F7FAFD;
    padding:8px 10px;
    border-radius:10px;
  }
  .card-actions{
    display:flex;
    gap:8px;
    margin-top:10px;
  }
  .card-actions button{
    flex:1;
    border:none;
    padding:8px 0;
    border-radius:10px;
    font-size:12.5px;
    font-weight:700;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:5px;
  }
  .btn-call{background:var(--green-tint); color:var(--green);}
  .btn-done{background:var(--blue-tint-2); color:var(--blue-deep);}
  .btn-edit{background:#F0F2F5; color:var(--slate);}
  .btn-del{background:var(--red-tint); color:var(--red); flex:0 0 38px;}

  .empty-state{
    text-align:center;
    padding:50px 20px;
    color:var(--slate-light);
  }
  .empty-state .icon{font-size:40px; margin-bottom:8px;}
  .empty-state .msg{font-size:14px; font-weight:600; color:var(--slate);}
  .empty-state .sub{font-size:12.5px; margin-top:4px;}

  /* client directory list (no visit yet) */
  .mini-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:var(--white);
    border-radius:14px;
    padding:12px 14px;
    box-shadow:var(--shadow);
    margin-bottom:8px;
  }
  .mini-row .left{display:flex; align-items:center; gap:10px;}
  .avatar{
    width:36px;height:36px;
    border-radius:50%;
    background: var(--blue-tint-2);
    color: var(--blue-deep);
    display:flex; align-items:center; justify-content:center;
    font-weight:700; font-size:14px;
    flex-shrink:0;
  }
  .mini-row .name{font-size:14px; font-weight:600;}
  .mini-row .phone{font-size:12px; color:var(--slate-light);}

  /* ---------- COMPACT LIST ROW (new home screen) ---------- */
  .clist-row{
    display:flex;
    align-items:center;
    gap:12px;
    background:var(--white);
    border-radius:14px;
    padding:12px 14px;
    box-shadow:var(--shadow);
    margin-bottom:8px;
    border-left:4px solid var(--blue-deep);
    cursor:pointer;
  }
  .clist-row.status-today{border-left-color:var(--amber);}
  .clist-row.status-overdue{border-left-color:var(--red);}
  .clist-row.status-done{border-left-color:var(--green);}
  .clist-row.status-followup,.clist-row.status-followup-upcoming{border-left-color:#7B4FCC;}
  .clist-avatar{
    width:38px;height:38px;
    border-radius:50%;
    background:var(--blue-tint-2);
    color:var(--blue-deep);
    display:flex; align-items:center; justify-content:center;
    font-weight:700; font-size:13px;
    flex-shrink:0;
  }
  .clist-body{flex:1; min-width:0;}
  .clist-name{font-size:14.5px; font-weight:700; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .clist-sub{font-size:12px; color:var(--slate-light); margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .clist-right{text-align:right; flex-shrink:0;}
  .clist-time{font-size:13px; font-weight:700; color:var(--blue-deep);}
  .clist-date{font-size:10.5px; color:var(--slate-light); margin-top:1px;}
  .clist-chip{
    display:inline-block;
    font-size:9.5px;
    font-weight:700;
    padding:2px 7px;
    border-radius:20px;
    margin-top:4px;
    letter-spacing:0.2px;
  }
  .clist-chip.today{background:var(--amber-tint); color:#9a6a14;}
  .clist-chip.overdue{background:var(--red-tint); color:var(--red);}
  .clist-chip.upcoming{background:var(--blue-tint-2); color:var(--blue-deep);}
  .clist-chip.done{background:var(--green-tint); color:var(--green);}
  .clist-chip.followup,.clist-chip.followup-upcoming{background:#EFE7FB; color:#7B4FCC;}
  .clist-chip.dead{background:#F0F0F0; color:#7A7A7A;}
  .clist-row.status-dead{border-left-color:#AAAAAA; opacity:0.75;}
  .badge.dead{background:#F0F0F0; color:#7A7A7A;}
  .btn-dead{background:#F0F0F0; color:#7A7A7A;}
  .clist-chevron{color:var(--slate-light); font-size:18px; flex-shrink:0;}

  /* ---------- DETAIL MODAL ---------- */
  .detail-row{display:flex; gap:10px; padding:10px 0; border-bottom:1px solid #F0F2F5;}
  .detail-row:last-child{border-bottom:none;}
  .detail-row .dlabel{font-size:11.5px; font-weight:700; color:var(--slate-light); text-transform:uppercase; letter-spacing:0.3px; flex:0 0 90px;}
  .detail-row .dval{font-size:14px; color:var(--ink); flex:1;}
  .detail-header{display:flex; align-items:center; gap:12px; margin-bottom:4px;}
  .detail-avatar{
    width:48px;height:48px; border-radius:50%;
    background:var(--blue-tint-2); color:var(--blue-deep);
    display:flex; align-items:center; justify-content:center;
    font-weight:700; font-size:17px; flex-shrink:0;
  }
  .btn-whatsapp{background:#DDF3E4; color:#1F8C3B;}

  /* ---------- DETAIL TABS ---------- */
  .detail-tabs{display:flex; gap:0; margin:14px 0 0; border-bottom:2px solid #EEF2F7;}
  .detail-tab{
    flex:1; text-align:center; padding:8px 4px; font-size:13px; font-weight:700;
    color:var(--slate-light); border:none; background:none; cursor:pointer;
    border-bottom:2px solid transparent; margin-bottom:-2px;
  }
  .detail-tab.active{color:var(--blue-deep); border-bottom-color:var(--blue-deep);}

  /* ---------- HISTORY THREAD ---------- */
  .history-thread{margin-top:12px; position:relative; padding-left:20px;}
  .history-thread::before{
    content:''; position:absolute; left:6px; top:4px; bottom:4px;
    width:2px; background:linear-gradient(to bottom,var(--blue-deep),var(--blue-tint-2));
    border-radius:2px;
  }
  .h-item{position:relative; margin-bottom:14px;}
  .h-dot{
    position:absolute; left:-20px; top:4px;
    width:10px; height:10px; border-radius:50%;
    background:var(--blue-deep); border:2px solid white;
    box-shadow:0 0 0 1px var(--blue-deep);
  }
  .h-dot.done{background:var(--green); box-shadow:0 0 0 1px var(--green);}
  .h-dot.dead{background:#AAA; box-shadow:0 0 0 1px #AAA;}
  .h-dot.followup{background:#7B4FCC; box-shadow:0 0 0 1px #7B4FCC;}
  .h-dot.revived{background:var(--amber); box-shadow:0 0 0 1px var(--amber);}
  .h-time{font-size:10.5px; color:var(--slate-light); font-weight:500; margin-bottom:2px;}
  .h-text{font-size:13.5px; color:var(--ink); font-weight:600;}
  .h-sub{font-size:12px; color:var(--slate); margin-top:2px; line-height:1.4;}
  nav.tabbar{
    position:absolute;
    bottom:0; left:0; right:0;
    background: var(--white);
    display:flex;
    padding: 8px 6px calc(env(safe-area-inset-bottom,0px) + 8px);
    box-shadow: 0 -2px 12px rgba(26,77,143,0.10);
    z-index:5;
  }
  .tab{
    flex:1;
    text-align:center;
    border:none;
    background:none;
    padding:6px 2px;
    color: var(--slate-light);
    cursor:pointer;
    border-radius:12px;
  }
  .tab .icon{font-size:20px; display:block;}
  .tab .lbl{font-size:10.5px; font-weight:600; margin-top:2px; display:block;}
  .tab.active{color: var(--blue-deep);}
  .tab.active .icon{transform:scale(1.05);}

  .fab{
    position:absolute;
    right:18px;
    bottom: 78px;
    width:56px; height:56px;
    border-radius:50%;
    background: linear-gradient(135deg, var(--blue-deep), #21609e);
    color:white;
    font-size:28px;
    border:none;
    box-shadow: 0 6px 16px rgba(26,77,143,0.35);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    z-index:6;
    line-height:1;
  }

  /* ---------- MODAL ---------- */
  .modal-overlay{
    position:fixed; inset:0;
    background:rgba(16,38,59,0.45);
    display:none;
    align-items:flex-end;
    justify-content:center;
    z-index:20;
  }
  .modal-overlay.open{display:flex;}
  .modal{
    background:var(--white);
    width:100%;
    max-width:480px;
    border-radius:22px 22px 0 0;
    padding:18px 20px calc(env(safe-area-inset-bottom,0px) + 20px);
    max-height:88vh;
    overflow-y:auto;
    animation: slideUp 0.22s ease-out;
  }
  @keyframes slideUp{from{transform:translateY(30px); opacity:0.5;} to{transform:translateY(0); opacity:1;}}
  .modal-handle{
    width:36px;height:4px;background:#E0E6ED;border-radius:4px;margin:0 auto 14px;
  }
  .modal h2{font-size:18px; margin:0 0 14px; color:var(--ink); font-weight:700;}
  .field{margin-bottom:13px;}
  .field label{
    display:block; font-size:12.5px; font-weight:700; color:var(--slate);
    margin-bottom:5px; text-transform:uppercase; letter-spacing:0.3px;
  }
  .field input, .field textarea, .field select{
    width:100%;
    border:1.5px solid #E0E8F0;
    background:#F8FAFC;
    border-radius:11px;
    padding:11px 12px;
    font-size:14.5px;
    font-family:inherit;
    color:var(--ink);
  }
  .field input:focus, .field textarea:focus, .field select:focus{
    outline:none; border-color:var(--blue-deep); background:white;
  }
  .field textarea{resize:vertical; min-height:60px;}
  .row2{display:flex; gap:10px;}
  .row2 .field{flex:1;}
  .modal-actions{display:flex; gap:10px; margin-top:6px;}
  .btn-primary{
    flex:1; background:var(--blue-deep); color:white; border:none;
    padding:13px 0; border-radius:12px; font-size:15px; font-weight:700; cursor:pointer;
  }
  .btn-secondary{
    background:#F0F2F5; color:var(--slate); border:none;
    padding:13px 18px; border-radius:12px; font-size:15px; font-weight:700; cursor:pointer;
  }
  .toast{
    position:absolute;
    top: calc(env(safe-area-inset-top,0px) + 14px);
    left:50%; transform:translateX(-50%) translateY(-10px);
    background:var(--ink); color:white;
    padding:10px 18px; border-radius:30px;
    font-size:13px; font-weight:600;
    opacity:0; transition: all 0.25s ease;
    z-index:50; pointer-events:none;
    box-shadow:0 4px 14px rgba(0,0,0,0.25);
    white-space:nowrap;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  ::-webkit-scrollbar{width:0px;}

  /* ---------- SEARCH & FILTER BAR ---------- */
  .search-bar{
    display:flex;
    align-items:center;
    gap:8px;
    padding:10px 16px 0;
    flex-shrink:0;
  }
  .search-input-wrap{
    flex:1;
    display:flex;
    align-items:center;
    background:var(--white);
    border-radius:12px;
    padding:0 12px;
    box-shadow:var(--shadow);
    border:1.5px solid transparent;
  }
  .search-input-wrap:focus-within{border-color:var(--blue-deep);}
  .search-input-wrap .si{font-size:16px; margin-right:6px; opacity:0.5;}
  .search-input-wrap input{
    flex:1; border:none; background:none;
    padding:10px 0; font-size:14px; color:var(--ink);
    font-family:inherit;
  }
  .search-input-wrap input:focus{outline:none;}
  .search-input-wrap input::placeholder{color:var(--slate-light);}
  .search-clear{font-size:16px; opacity:0.4; cursor:pointer; padding:4px;}
  .filter-sort-btn{
    width:42px; height:42px;
    background:var(--white);
    border-radius:12px;
    box-shadow:var(--shadow);
    display:flex; align-items:center; justify-content:center;
    font-size:18px; cursor:pointer; flex-shrink:0;
    border:1.5px solid transparent;
    position:relative;
  }
  .filter-sort-btn.active{border-color:var(--blue-deep); background:var(--blue-tint-2);}
  .filter-sort-btn .badge-dot{
    position:absolute; top:6px; right:6px;
    width:7px; height:7px; border-radius:50%;
    background:var(--blue-deep); display:none;
  }
  .filter-sort-btn.active .badge-dot{display:block;}

  /* Sort/Filter panel */
  .sort-panel{
    background:var(--white);
    margin:8px 16px 0;
    border-radius:14px;
    box-shadow:var(--shadow);
    padding:12px 14px;
    display:none;
    flex-shrink:0;
  }
  .sort-panel.open{display:block;}
  .sort-panel-label{font-size:11px; font-weight:700; color:var(--slate-light); text-transform:uppercase; letter-spacing:0.4px; margin-bottom:8px;}
  .sort-options{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px;}
  .sort-chip{
    padding:6px 12px; border-radius:20px; font-size:12.5px; font-weight:600;
    background:var(--blue-tint); color:var(--blue-deep); cursor:pointer; border:none;
  }
  .sort-chip.active{background:var(--blue-deep); color:white;}

  /* Date group header */
  .date-group-hdr{
    font-size:12px; font-weight:700; color:var(--blue-deep);
    text-transform:uppercase; letter-spacing:0.5px;
    padding:12px 4px 6px;
    display:flex; align-items:center; gap:8px;
  }
  .date-group-hdr::after{
    content:''; flex:1; height:1px; background:var(--blue-tint-2);
  }
</style>
</head>
<body>
<div id="app">

  <header class="topbar">
    <div class="hello-veer">👋 Hello Veer</div>
    <div class="greet" id="dateLabel">Today</div>
    <div class="title">VisitDesk</div>
    <div class="stats-grid">
      <div class="stat-pill active" data-filter="all"><div class="num" id="statToday">0</div><div class="lbl">Today</div></div>
      <div class="stat-pill" data-filter="upcoming"><div class="num" id="statUpcoming">0</div><div class="lbl">Upcoming</div></div>
      <div class="stat-pill" data-filter="overdue"><div class="num" id="statOverdue">0</div><div class="lbl">Overdue</div></div>
      <div class="stat-pill" data-filter="done"><div class="num" id="statDone">0</div><div class="lbl">Done</div></div>
      <div class="stat-pill" data-filter="dead"><div class="num" id="statDead">0</div><div class="lbl">Dead</div></div>

<script>
/* ---------------- DATA LAYER ---------------- */
const STORAGE_KEY = 'visitdesk_clients_v1';
let clients = [];

function loadData(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    clients = raw ? JSON.parse(raw) : seedData();
  }catch(e){ clients = seedData(); }
}
function saveData(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(clients));
}
function seedData(){
  return [];
}
function uid(){ return 'c_' + Date.now() + '_' + Math.floor(Math.random()*9999); }

/* ---------------- STATE ---------------- */
let currentTab = 'home';
let editingId = null;
let activeFilter = 'all';
let searchQuery = '';
let sortBy = 'date';
let filterProperty = 'all';
let isRescheduling = false;

/* ---------------- HELPERS ---------------- */
function pad(n){ return n.toString().padStart(2,'0'); }
function todayStr(){
  const d = new Date();
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
}
function formatDateLabel(dateStr){
  const today = todayStr();
  const d = new Date(dateStr+'T00:00:00');
  const t = new Date(today+'T00:00:00');
  const diffDays = Math.round((d-t)/86400000);
  if(diffDays===0) return 'Today';
  if(diffDays===1) return 'Tomorrow';
  if(diffDays===-1) return 'Yesterday';
  return d.toLocaleDateString('en-IN', {day:'numeric', month:'short'});
}
function formatTime12(timeStr){
  if(!timeStr) return '';
  let [h,m] = timeStr.split(':').map(Number);
  const ampm = h>=12 ? 'PM':'AM';
  h = h%12; if(h===0) h=12;
  return h+':'+pad(m)+' '+ampm;
}

function getDateGroup(dateStr){
  const today = todayStr();
  const d = new Date(dateStr+'T00:00:00');
  const t = new Date(today+'T00:00:00');
  const diff = Math.round((d-t)/86400000);
  if(diff===0) return 'Today';
  if(diff===1) return 'Tomorrow';
  if(diff>=2 && diff<=6) return 'This Week';
  if(diff>=7 && diff<=13) return 'Next Week';
  return 'Later';
}
const DATE_GROUP_ORDER = ['Today','Tomorrow','This Week','Next Week','Later'];

function applySearchSort(list){
  let result = list;
  if(searchQuery){
    const q = searchQuery.toLowerCase();
    result = result.filter(c=>
      c.name.toLowerCase().includes(q) ||
      c.phone.toLowerCase().includes(q)
    );
  }
  if(filterProperty && filterProperty!=='all'){
    result = result.filter(c=>(c.property||'')===filterProperty);
  }
  if(sortBy==='name'){
    result = [...result].sort((a,b)=>a.name.localeCompare(b.name));
  } else {
    result = [...result].sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time));
  }
  return result;
}

function renderGrouped(list, groupFn, groupOrder){
  if(!list.length) return `<div class="empty-state"><div class="icon">📋</div><div class="msg">No results</div><div class="sub">Try a different search or filter</div></div>`;
  const groups = {};
  list.forEach(c=>{
    const g = groupFn(c);
    if(!groups[g]) groups[g]=[];
    groups[g].push(c);
  });
  let html='';
  (groupOrder||Object.keys(groups)).forEach(g=>{
    if(!groups[g]||!groups[g].length) return;
    html += `<div class="date-group-hdr">${g}</div>`;
    html += groups[g].map(c=>clistRowHTML(c)).join('');
  });
  return html;
}

function getAllProperties(){
  return [...new Set(clients.map(c=>c.property||'').filter(Boolean))];
}

function updatePropertyChips(){
  const props = getAllProperties();
  const wrap = document.getElementById('propertyChips');
  if(!wrap) return;
  wrap.innerHTML = `<button class="sort-chip ${filterProperty==='all'?'active':''}" data-prop="all">All Sites</button>`
    + props.map(p=>`<button class="sort-chip ${filterProperty===p?'active':''}" data-prop="${escapeHTML(p)}">${escapeHTML(p)}</button>`).join('');
  wrap.querySelectorAll('[data-prop]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      filterProperty = btn.getAttribute('data-prop');
      updatePropertyChips();
      render();
    });
  });
}
function getVisitStatus(c){
  if(c.done && !c.followupDate) return 'done';
  if(c.followupDate){
    const today = todayStr();
    if(c.followupDone) return 'done';
    return c.followupDate <= today ? 'followup' : 'followup-upcoming';
  }
  const now = new Date();
  const visitDT = new Date(c.date+'T'+c.time);
  const today = todayStr();
  if(c.date < today) return 'overdue';
  if(c.date === today){
    return visitDT < now ? 'overdue' : 'today';
  }
  return 'upcoming';
}

/* --- Per-tab precise membership rules --- */
function inDoneTab(c){
  // Visited (done=true) → always in Done, even if also dead or has followup
  return c.done === true;
}
function inDeadTab(c){
  // Any lead marked dead → in Dead tab
  return !!c.dead;
}
function inUpcomingTab(c){
  // Not visited yet (done=false) AND not dead AND status is upcoming/followup-upcoming
  // OR: visited (done=true) AND has a new follow-up visit scheduled (followupDate set, not done)
  if(c.done && c.followupDate && !c.followupDone){
    // Visited + given next date → show in upcoming too
    return true;
  }
  if(!c.done && !c.dead){
    const s = getVisitStatus(c);
    return s==='upcoming' || s==='followup-upcoming';
  }
  return false;
}
function inTodayTab(c){
  if(c.done) return false;
  if(c.dead) return false;
  return getVisitStatus(c)==='today';
}
function inOverdueTab(c){
  if(c.done) return false;
  if(c.dead) return false;
  return getVisitStatus(c)==='overdue';
}
function inFollowupDueTab(c){
  if(c.dead) return false;
  return getVisitStatus(c)==='followup';
}
function initials(name){
  return name.trim().split(/\s+/).slice(0,2).map(w=>w[0]?.toUpperCase()||'').join('');
}
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1800);
}

/* ---------------- RENDER ---------------- */
function render(){
  document.getElementById('dateLabel').textContent =
    new Date().toLocaleDateString('en-IN', {weekday:'long', day:'numeric', month:'long'});

  const todayCount = clients.filter(c=>inTodayTab(c)).length;
  const upcomingCount = clients.filter(c=>inUpcomingTab(c)).length;
  const overdueCount = clients.filter(c=>inOverdueTab(c)).length;
  const doneCount = clients.filter(c=>inDoneTab(c)).length;
  const deadCount = clients.filter(c=>inDeadTab(c)).length;
  document.getElementById('statToday').textContent = todayCount;
  document.getElementById('statUpcoming').textContent = upcomingCount;
  document.getElementById('statOverdue').textContent = overdueCount;
  document.getElementById('statDone').textContent = doneCount;
  document.getElementById('statDead').textContent = deadCount;
  document.getElementById('statClients').textContent = clients.length;

  const main = document.getElementById('mainContent');
  if(currentTab==='home') main.innerHTML = renderHome();
  else if(currentTab==='clients') main.innerHTML = renderClients();
  else main.innerHTML = renderSettings();

  attachCardEvents();
}

function renderHome(){
  const base = [...clients].sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time));

  // Filtered tabs — each uses its own precise membership rule
  if(activeFilter==='today'){
    const list = applySearchSort(base.filter(c=>inTodayTab(c)));
    return filterSection("Today's Visits", list);
  }
  if(activeFilter==='upcoming'){
    const list = applySearchSort(base.filter(c=>inUpcomingTab(c)));
    return sectionLabel('Upcoming Visits', list.length) +
      renderGrouped(list, c=>getDateGroup(c.followupDate||c.date), DATE_GROUP_ORDER);
  }
  if(activeFilter==='overdue'){
    const list = applySearchSort(base.filter(c=>inOverdueTab(c)));
    return filterSection('Overdue Visits', list);
  }
  if(activeFilter==='done'){
    const list = applySearchSort(base.filter(c=>inDoneTab(c)));
    return filterSection('Completed Visits', list);
  }
  if(activeFilter==='dead'){
    const list = applySearchSort(base.filter(c=>inDeadTab(c)));
    return filterSection('Dead Leads', list);
  }
  if(activeFilter==='clients'){
    return renderClients();
  }

  // Default home view
  const q = searchQuery.toLowerCase();
  const matches = q ? base.filter(c=>c.name.toLowerCase().includes(q)||c.phone.toLowerCase().includes(q)) : null;

  if(matches){
    const results = applySearchSort(matches);
    if(!results.length) return `<div class="empty-state"><div class="icon">🔍</div><div class="msg">No results for "${searchQuery}"</div><div class="sub">Try a different name or phone number</div></div>`;
    return sectionLabel(`Results for "${searchQuery}"`, results.length) + results.map(c=>clistRowHTML(c)).join('');
  }

  if(clients.length===0){
    return `<div class="empty-state"><div class="icon">🏘️</div><div class="msg">No visits scheduled yet</div><div class="sub">Tap the + button to add your first client visit</div></div>`;
  }

  const overdue = base.filter(c=>inOverdueTab(c));
  const today = base.filter(c=>inTodayTab(c));
  const upcoming = base.filter(c=>inUpcomingTab(c));
  const followupDue = base.filter(c=>inFollowupDueTab(c));
  const done = base.filter(c=>inDoneTab(c)).slice(-3).reverse();

  let html = '';
  if(overdue.length){ html += sectionLabel('Overdue', overdue.length); html += overdue.map(c=>clistRowHTML(c)).join(''); }
  if(today.length){ html += sectionLabel("Today's Visits", today.length); html += today.map(c=>clistRowHTML(c)).join(''); }
  if(upcoming.length){
    html += sectionLabel('Upcoming', upcoming.length);
    html += renderGrouped(upcoming, c=>getDateGroup(c.followupDate||c.date), DATE_GROUP_ORDER);
  }
  if(followupDue.length){ html += sectionLabel('Follow-ups Due', followupDue.length); html += followupDue.map(c=>clistRowHTML(c)).join(''); }
  if(done.length){ html += sectionLabel('Recently Done', done.length); html += done.map(c=>clistRowHTML(c)).join(''); }
  if(!html) html = `<div class="empty-state"><div class="icon">✅</div><div class="msg">All caught up</div><div class="sub">No pending visits right now</div></div>`;
  return html;
}

function filterSection(title, list){
  if(list.length===0) return `<div class="empty-state"><div class="icon">📋</div><div class="msg">No ${title.toLowerCase()}</div><div class="sub">Nothing here right now</div></div>`;
  return sectionLabel(title, list.length) + list.map(c=>clistRowHTML(c)).join('');
}

function sectionLabel(text,count){
  return `<div class="section-label">${text}<span class="count">${count}</span></div>`;
}

function clistRowHTML(c){
  const status = getVisitStatus(c);
  const isFollowup = status==='followup' || status==='followup-upcoming';
  const chipText = status==='overdue'?'Overdue':status==='today'?'Today':status==='done'?'Done'
    : status==='followup'?'Follow-up Due':status==='followup-upcoming'?'Follow-up Set':'Upcoming';
  const chipClass = status;

  let timeBlock;
  if(isFollowup){
    timeBlock = `<div class="clist-time">${formatDateLabel(c.followupDate)}</div>`;
  } else {
    timeBlock = `<div class="clist-time">${formatTime12(c.time)}</div><div class="clist-date">${formatDateLabel(c.date)}</div>`;
  }
  const sub = c.property ? escapeHTML(c.property) : escapeHTML(c.phone);
  const deadTag = c.dead ? `<span class="clist-chip dead" style="margin-left:4px">💀 Dead</span>` : '';

  return `
  <div class="clist-row status-${c.dead?'dead':status}" data-action="opendetail" data-id="${c.id}">
    <div class="clist-avatar">${initials(c.name)}</div>
    <div class="clist-body">
      <div class="clist-name">${escapeHTML(c.name)}</div>
      <div class="clist-sub">${sub}</div>
    </div>
    <div class="clist-right">
      ${timeBlock}
      <span class="clist-chip ${chipClass}">${chipText}</span>${deadTag}
    </div>
    <div class="clist-chevron">›</div>
  </div>`;
}

function renderClients(){
  if(clients.length===0){
    return `<div class="empty-state"><div class="icon">👥</div><div class="msg">No clients yet</div><div class="sub">Add a client to get started</div></div>`;
  }
  // unique clients by phone, show their latest visit
  const byPhone = {};
  clients.forEach(c=>{
    if(!byPhone[c.phone] || (c.date+c.time) > (byPhone[c.phone].date+byPhone[c.phone].time)){
      byPhone[c.phone] = c;
    }
  });
  const list = Object.values(byPhone).sort((a,b)=>a.name.localeCompare(b.name));
  return sectionLabel('All Clients', list.length) +
    list.map(c=>`
      <div class="mini-row" data-action="edit" data-id="${c.id}">
        <div class="left">
          <div class="avatar">${initials(c.name)}</div>
          <div>
            <div class="name">${escapeHTML(c.name)}</div>
            <div class="phone">${escapeHTML(c.phone)}</div>
          </div>
        </div>
        <div style="font-size:18px;color:var(--slate-light)">›</div>
      </div>
    `).join('');
}

function renderSettings(){
  const notifStatus = !('Notification' in window) ? 'Not supported on this browser'
    : Notification.permission==='granted' ? '✅ Enabled'
    : Notification.permission==='denied' ? '❌ Blocked — enable in phone settings'
    : '⚠️ Tap to enable';
  return `
    <div class="section-label">Notifications</div>
    <div class="mini-row" id="notifBtn" style="cursor:pointer">
      <div class="left"><div class="avatar" style="background:#FEF3E2;color:#E8A33D">🔔</div><div><div class="name">Visit Reminders</div><div class="phone">${notifStatus}</div></div></div>
      <div style="font-size:18px;color:var(--slate-light)">›</div>
    </div>
    <div class="section-label">Backup & Export</div>
    <div class="mini-row" id="exportBtn" style="cursor:pointer">
      <div class="left"><div class="avatar" style="background:var(--blue-tint-2);color:var(--blue-deep)">⬇️</div><div><div class="name">Export Backup</div><div class="phone">Save all data as .json file</div></div></div>
      <div style="font-size:18px;color:var(--slate-light)">›</div>
    </div>
    <div class="mini-row" id="exportExcelBtn" style="cursor:pointer">
      <div class="left"><div class="avatar" style="background:var(--green-tint);color:var(--green)">📊</div><div><div class="name">Export to Excel</div><div class="phone">Download as .csv (opens in Excel)</div></div></div>
      <div style="font-size:18px;color:var(--slate-light)">›</div>
    </div>
    <div class="mini-row" id="importBtn" style="cursor:pointer">
      <div class="left"><div class="avatar" style="background:var(--amber-tint);color:var(--amber)">⬆️</div><div><div class="name">Import Backup</div><div class="phone">Restore from a .json backup file</div></div></div>
      <div style="font-size:18px;color:var(--slate-light)">›</div>
    </div>
    <input type="file" id="importFile" accept=".json" style="display:none">
    <div class="section-label">About</div>
    <div class="mini-row">
      <div class="left"><div class="avatar">ℹ️</div><div><div class="name">VisitDesk v3.0</div><div class="phone">Your data stays on this device only</div></div></div>
    </div>
    <div class="mini-row" id="clearBtn" style="cursor:pointer">
      <div class="left"><div class="avatar" style="background:var(--red-tint);color:var(--red)">⚠️</div><div><div class="name" style="color:var(--red)">Clear all data</div><div class="phone">This cannot be undone</div></div></div>
    </div>
  `;
}

function escapeHTML(str){
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

/* ---------------- EVENTS ---------------- */
function attachCardEvents(){
  document.querySelectorAll('[data-action]').forEach(el=>{
    el.addEventListener('click', (e)=>{
      e.stopPropagation();
      const action = el.getAttribute('data-action');
      const id = el.getAttribute('data-id');
      if(action==='opendetail') openDetail(id);
      else if(action==='call') makeCall(id);
      else if(action==='done') markDone(id);
      else if(action==='followupdone') markFollowupDone(id);
      else if(action==='dead') { closeDetail(); markDead(id); }
      else if(action==='edit') openEdit(id);
      else if(action==='delete') deleteClient(id);
    });
  });
  const notifBtn = document.getElementById('notifBtn');
  if(notifBtn) notifBtn.addEventListener('click', async ()=>{
    await requestNotifPermission();
    render();
  });
  const exportBtn = document.getElementById('exportBtn');
  if(exportBtn) exportBtn.addEventListener('click', exportData);
  const exportExcelBtn = document.getElementById('exportExcelBtn');
  if(exportExcelBtn) exportExcelBtn.addEventListener('click', exportExcel);
  const importBtn = document.getElementById('importBtn');
  if(importBtn) importBtn.addEventListener('click', ()=>document.getElementById('importFile').click());
  const importFile = document.getElementById('importFile');
  if(importFile) importFile.addEventListener('change', importData);
  const clearBtn = document.getElementById('clearBtn');
  if(clearBtn) clearBtn.addEventListener('click', clearAllData);
}

function makeCall(id){
  const c = clients.find(x=>x.id===id);
  if(c) window.location.href = 'tel:'+c.phone;
}
function makeWhatsapp(id){
  const c = clients.find(x=>x.id===id);
  if(!c) return;
  const phone = c.phone.replace(/\D/g,'');
  const intlPhone = phone.startsWith('0') ? '91'+phone.slice(1) : (phone.length===10 ? '91'+phone : phone);
  window.open('https://wa.me/'+intlPhone, '_blank');
}

let detailId = null;
function openDetail(id){
  const c = clients.find(x=>x.id===id);
  if(!c) return;
  detailId = id;
  const status = getVisitStatus(c);
  const isFollowup = status==='followup'||status==='followup-upcoming';
  const badgeText = status==='overdue'?'Overdue':status==='today'?'Today':status==='done'?'Completed'
    :status==='followup'?'Follow-up Due':status==='followup-upcoming'?'Follow-up Scheduled'
    :status==='dead'?'Dead Lead':'Upcoming';
  const badgeClass = (status==='followup'||status==='followup-upcoming')?'followup':status;

  document.getElementById('dAvatar').textContent = initials(c.name);
  document.getElementById('dName').textContent = c.name;
  const badge = document.getElementById('dBadge');
  badge.textContent = badgeText;
  badge.className = 'badge '+badgeClass;
  document.getElementById('dPhone').textContent = c.phone;

  const propRow = document.getElementById('dPropertyRow');
  propRow.style.display = c.property ? 'flex':'none';
  document.getElementById('dProperty').textContent = c.property||'';

  document.getElementById('dTime').textContent = formatDateLabel(c.date)+' · '+formatTime12(c.time);
  const remarksRow = document.getElementById('dRemarksRow');
  remarksRow.style.display = c.remarks ? 'flex':'none';
  document.getElementById('dRemarks').textContent = c.remarks||'';

  const fuRow = document.getElementById('dFollowupRow');
  fuRow.style.display = c.followupDate ? 'flex':'none';
  document.getElementById('dFollowup').textContent = c.followupDate ? formatDateLabel(c.followupDate)+(c.followupNote?' — '+c.followupNote:'') : '';

  // Show/hide action buttons based on status
  document.getElementById('dDoneBtn').style.display = (!c.dead && !c.done && !isFollowup) ? 'flex':'none';
  document.getElementById('dFollowupDoneBtn').style.display = (!c.dead && isFollowup) ? 'flex':'none';
  const deadBtn = document.getElementById('dDeadBtn');
  deadBtn.style.display = 'flex';
  if(c.dead){
    deadBtn.textContent = '♻️ Revive Lead';
    deadBtn.onclick = ()=>{ closeDetail(); reviveLead(id); };
  } else {
    deadBtn.textContent = '💀 Mark Dead';
    deadBtn.onclick = ()=>{ closeDetail(); markDead(id); };
  }

  // Wire up remaining buttons
  document.getElementById('dCallBtn').onclick = ()=>makeCall(id);
  document.getElementById('dWhatsappBtn').onclick = ()=>makeWhatsapp(id);
  document.getElementById('dDoneBtn').onclick = ()=>{ closeDetail(); markDone(id); };
  document.getElementById('dFollowupDoneBtn').onclick = ()=>{ closeDetail(); markFollowupDone(id); };
  document.getElementById('dEditBtn').onclick = ()=>{ closeDetail(); openEdit(id); };
  document.getElementById('dDelBtn').onclick = ()=>{ closeDetail(); deleteClient(id); };
  document.getElementById('dRescheduleBtn').onclick = ()=>{ closeDetail(); openReschedule(id); };

  // Wire up Info / History tab switching
  const tabInfo = document.getElementById('dTabInfo');
  const tabHist = document.getElementById('dTabHistory');
  const panelInfo = document.getElementById('dPanelInfo');
  const panelHist = document.getElementById('dPanelHistory');

  function showInfoTab(){
    tabInfo.classList.add('active'); tabHist.classList.remove('active');
    panelInfo.style.display='block'; panelHist.style.display='none';
  }
  function showHistoryTab(){
    tabHist.classList.add('active'); tabInfo.classList.remove('active');
    panelHist.style.display='block'; panelInfo.style.display='none';
    document.getElementById('dHistoryThread').innerHTML = renderHistoryThread(c);
  }
  tabInfo.onclick = showInfoTab;
  tabHist.onclick = showHistoryTab;
  // Always open on Info tab
  showInfoTab();

  document.getElementById('detailOverlay').classList.add('open');
}
function closeDetail(){
  document.getElementById('detailOverlay').classList.remove('open');
  detailId = null;
}
let pendingDoneId = null;

function markDone(id){
  const c = clients.find(x=>x.id===id);
  if(!c) return;
  c.done = true;
  addHistory(c, 'done', c.remarks||'');
  saveData();
  pendingDoneId = id;
  document.getElementById('followupName').textContent = c.name;
  document.getElementById('fuQuick').value = '3';
  document.getElementById('fuCustomDateField').style.display = 'none';
  document.getElementById('fuCustomDate').value = '';
  document.getElementById('fuNote').value = '';
  document.getElementById('followupOverlay').classList.add('open');
}
function markFollowupDone(id){
  const c = clients.find(x=>x.id===id);
  if(c){
    c.followupDone = true;
    addHistory(c, 'followupdone', c.followupNote||'');
    saveData(); render(); showToast('Follow-up completed ✓');
  }
}
function markDead(id){
  const c = clients.find(x=>x.id===id);
  if(!c) return;
  if(!confirm('Mark "'+c.name+'" as a dead lead? They will be moved out of active visits.')) return;
  c.dead = true;
  addHistory(c, 'dead', 'Not interested / No further follow-up');
  saveData(); render(); showToast('Marked as dead lead');
}
function reviveLead(id){
  const c = clients.find(x=>x.id===id);
  if(c){
    c.dead = false;
    addHistory(c, 'revived', '');
    saveData(); render(); showToast('Lead revived ✓');
  }
}
function closeFollowupModal(){
  document.getElementById('followupOverlay').classList.remove('open');
  pendingDoneId = null;
  render();
}
function addDays(dateStr, n){
  const d = new Date(dateStr+'T00:00:00');
  d.setDate(d.getDate()+n);
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
}
function saveFollowup(){
  const c = clients.find(x=>x.id===pendingDoneId);
  if(!c){ closeFollowupModal(); return; }
  const quick = document.getElementById('fuQuick').value;
  const note = document.getElementById('fuNote').value.trim();
  if(quick==='none'){
    showToast('Visit completed ✓');
    closeFollowupModal();
    return;
  }
  let fuDate;
  if(quick==='custom'){
    fuDate = document.getElementById('fuCustomDate').value;
    if(!fuDate){ showToast('Pick a follow-up date'); return; }
  } else {
    fuDate = addDays(todayStr(), parseInt(quick,10));
  }
  c.followupDate = fuDate;
  c.followupNote = note;
  c.followupDone = false;
  addHistory(c, 'followup', formatDateLabel(fuDate)+(note?' — '+note:''));
  saveData();
  showToast('Follow-up scheduled ✓');
  closeFollowupModal();
}
function deleteClient(id){
  if(!confirm('Delete this visit record? This cannot be undone.')) return;
  clients = clients.filter(x=>x.id!==id);
  saveData(); render(); showToast('Deleted');
}
function openReschedule(id){
  const c = clients.find(x=>x.id===id);
  if(!c) return;
  editingId = id;
  isRescheduling = true;
  document.getElementById('modalTitle').textContent = '🔄 Reschedule Visit';
  document.getElementById('fName').value = c.name;
  document.getElementById('fPhone').value = c.phone;
  document.getElementById('fDate').value = ''; // clear — must pick new date
  document.getElementById('fTime').value = ''; // clear — must pick new time
  document.getElementById('fProperty').value = c.property||'';
  document.getElementById('fRemarks').value = '';
  document.getElementById('fAlarm').value = c.alarmMins ?? 30;
  openModal();
}
function openEdit(id){
  const c = clients.find(x=>x.id===id);
  if(!c) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = 'Edit Client & Visit';
  document.getElementById('fName').value = c.name;
  document.getElementById('fPhone').value = c.phone;
  document.getElementById('fDate').value = c.date;
  document.getElementById('fTime').value = c.time;
  document.getElementById('fProperty').value = c.property||'';
  document.getElementById('fRemarks').value = c.remarks||'';
  document.getElementById('fAlarm').value = c.alarmMins ?? 30;
  openModal();
}
function openModal(){
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(){
  document.getElementById('modalOverlay').classList.remove('open');
  editingId = null;
  isRescheduling = false;
  ['fName','fPhone','fDate','fTime','fProperty','fRemarks'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fAlarm').value = '30';
  document.getElementById('modalTitle').textContent = 'New Client & Visit';
}

function saveVisit(){
  const name = document.getElementById('fName').value.trim();
  const phone = document.getElementById('fPhone').value.trim();
  const date = document.getElementById('fDate').value;
  const time = document.getElementById('fTime').value;
  const property = document.getElementById('fProperty').value.trim();
  const remarks = document.getElementById('fRemarks').value.trim();
  const alarmMins = parseInt(document.getElementById('fAlarm').value,10);

  if(!name || !phone || !date || !time){
    showToast('Please fill name, phone, date & time');
    return;
  }

  if(editingId){
    const c = clients.find(x=>x.id===editingId);
    if(isRescheduling){
      // Log old visit to history before updating
      addHistory(c, 'rescheduled', (property||c.property||'')+' · '+formatDateLabel(date)+' at '+formatTime12(time));
      // Reset done/followup status so it becomes active again
      c.done = false;
      c.followupDate = null;
      c.followupNote = null;
      c.followupDone = false;
    } else {
      addHistory(c, 'edited', (property||'')+' · '+formatDateLabel(date)+' at '+formatTime12(time));
    }
    Object.assign(c, {name, phone, date, time, property, remarks, alarmMins});
  } else {
    const newClient = { id: uid(), name, phone, date, time, property, remarks, alarmMins, done:false, history:[] };
    addHistory(newClient, 'scheduled', (property||'')+' · '+formatDateLabel(date)+' at '+formatTime12(time));
    clients.push(newClient);
  }
  isRescheduling = false;
  saveData();
  scheduleNotification({name, phone, date, time, property, remarks, alarmMins});
  closeModal();
  render();
  showToast(editingId ? 'Visit updated' : 'Visit saved ✓');
}

/* ---------------- HISTORY ---------------- */
function addHistory(c, type, note=''){
  if(!c.history) c.history = [];
  c.history.push({ type, note, ts: Date.now() });
}
function formatTS(ts){
  const d = new Date(ts);
  return d.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})
    +' · '+d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true});
}
function renderHistoryThread(c){
  if(!c.history || c.history.length===0){
    return `<div style="text-align:center;padding:30px 0;color:var(--slate-light);font-size:13px;">No history yet</div>`;
  }
  const typeMap = {
    'scheduled':  {icon:'📅', label:'Visit Scheduled',   dot:''},
    'rescheduled':{icon:'🔄', label:'Visit Rescheduled',  dot:''},
    'done':       {icon:'✅', label:'Visit Completed',    dot:'done'},
    'followup':   {icon:'🔁', label:'Follow-up Scheduled',dot:'followup'},
    'followupdone':{icon:'✓', label:'Follow-up Done',     dot:'followup'},
    'dead':       {icon:'💀', label:'Marked Dead Lead',   dot:'dead'},
    'revived':    {icon:'♻️', label:'Lead Revived',       dot:'revived'},
    'edited':     {icon:'✎',  label:'Details Updated',    dot:''},
  };
  return [...c.history].reverse().map(h=>{
    const t = typeMap[h.type] || {icon:'•', label:h.type, dot:''};
    return `<div class="h-item">
      <div class="h-dot ${t.dot}"></div>
      <div class="h-time">${formatTS(h.ts)}</div>
      <div class="h-text">${t.icon} ${t.label}</div>
      ${h.note ? `<div class="h-sub">${escapeHTML(h.note)}</div>` : ''}
    </div>`;
  }).join('');
}
const _notifTimers = {};

async function requestNotifPermission(){
  if(!('Notification' in window)) return;
  if(Notification.permission==='default'){
    const perm = await Notification.requestPermission();
    if(perm==='granted'){
      showToast('🔔 Notifications enabled!');
      rescheduleAllNotifications();
    }
  }
}

function scheduleNotification(c){
  if(!('Notification' in window) || Notification.permission!=='granted') return;
  if(c.done || c.dead) return;
  const visitDT = new Date(c.date+'T'+c.time);
  const alarmMins = c.alarmMins ?? 30;
  const fireAt = visitDT.getTime() - alarmMins*60000;
  const msUntil = fireAt - Date.now();
  if(msUntil <= 0 || msUntil > 48*60*60*1000) return;
  // Clear any existing timer for this client
  if(_notifTimers[c.id]) clearTimeout(_notifTimers[c.id]);
  _notifTimers[c.id] = setTimeout(()=>{
    try{
      const title = '🏠 Visit Reminder: '+c.name;
      const body = (c.property ? c.property+' · ':'')+formatTime12(c.time)
        +(c.remarks ? ' — '+c.remarks : '');
      new Notification(title,{
        body, tag: c.id,
        requireInteraction: true,
        vibrate:[300,100,300,100,300]
      });
    }catch(e){}
  }, msUntil);
}

function rescheduleAllNotifications(){
  clients.filter(c=>!c.done && !c.dead).forEach(c=>scheduleNotification(c));
}

function registerSW(){ /* no-op: SW not needed with setTimeout approach */ }

/* ---------------- BACKUP ---------------- */
function exportData(){
  const blob = new Blob([JSON.stringify(clients,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'visitdesk-backup-'+todayStr()+'.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  showToast('Backup downloaded');
}
function exportExcel(){
  const headers = ['Name','Phone','Property','Visit Date','Visit Time','Remarks','Status','Follow-up Date','Follow-up Note'];
  const rows = clients.map(c=>{
    const status = getVisitStatus(c);
    return [
      c.name, c.phone, c.property||'', c.date, formatTime12(c.time),
      c.remarks||'', status, c.followupDate||'', c.followupNote||''
    ].map(v=>'"'+String(v).replace(/"/g,'""')+'"');
  });
  const csv = [headers.join(','), ...rows.map(r=>r.join(','))].join('\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'visitdesk-'+todayStr()+'.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  showToast('Excel file downloaded');
}
function importData(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(ev){
    try{
      const data = JSON.parse(ev.target.result);
      if(Array.isArray(data)){
        clients = data;
        saveData();
        render();
        showToast('Backup restored ✓');
      }
    }catch(err){ showToast('Invalid backup file'); }
  };
  reader.readAsText(file);
}
function clearAllData(){
  if(!confirm('This will permanently delete ALL client and visit data. Continue?')) return;
  if(!confirm('Are you absolutely sure? This cannot be undone.')) return;
  clients = [];
  saveData();
  render();
  showToast('All data cleared');
}
